name: Scrape Real Listings

on:
  schedule:
    - cron: '0 6 * * *' # Diario a las 6am UTC (1am Colombia)
  workflow_dispatch: # Permite ejecutar manualmente

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run scraper
        run: node scripts/scrape.mjs
      - name: Commit updated listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/listings.json
          git diff --staged --quiet || git commit -m "Update listings data $(date -u +%Y-%m-%d)"
          git push
